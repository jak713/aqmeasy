[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Prevent Qt GUI windows from showing during tests
qt_api = "pyside6"
addopts = [
    "-v",
    "--tb=short",
    "-p", "no:qt",  # Disable qt plugin by default to avoid SIGABRT during collection
]

# Re-enable qt plugin only for GUI tests
markers = [
    "qt: marks tests as requiring Qt (deselect with '-m \"not qt\"')",
]
